name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure modern npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build app
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: CLI smoke test
        run: node ./bin/paint.js help

      - name: CLI lifecycle smoke test
        shell: bash
        run: |
          set -euo pipefail
          node ./bin/paint.js stop || true
          node ./bin/paint.js start --port 4100
          trap 'node ./bin/paint.js stop || true' EXIT
          curl --retry 25 --retry-delay 1 --retry-connrefused -fsS http://127.0.0.1:4100/api/claude/status > /dev/null
          node ./bin/paint.js status
          node ./bin/paint.js stop
          node ./bin/paint.js status

      - name: Terminal lifecycle smoke test
        shell: bash
        run: |
          set -euo pipefail
          node ./bin/paint.js terminal stop || true
          node ./bin/paint.js terminal start --terminal-port 4101
          trap 'node ./bin/paint.js terminal stop || true' EXIT
          curl --retry 25 --retry-delay 1 --retry-connrefused -fsS http://127.0.0.1:4101/health > /dev/null
          node ./bin/paint.js terminal status
          node ./bin/paint.js terminal restart --terminal-port 4101
          curl --retry 25 --retry-delay 1 --retry-connrefused -fsS http://127.0.0.1:4101/health > /dev/null
          node ./bin/paint.js terminal stop
          node ./bin/paint.js terminal status

      - name: Bridge lifecycle smoke test
        shell: bash
        run: |
          set -euo pipefail
          node ./bin/paint.js bridge stop || true
          node ./bin/paint.js bridge start --bridge-port 4102
          trap 'node ./bin/paint.js bridge stop || true' EXIT
          curl --retry 25 --retry-delay 1 --retry-connrefused -fsS http://127.0.0.1:4102/health > /dev/null
          node ./bin/paint.js bridge status
          node ./bin/paint.js bridge restart --bridge-port 4102
          curl --retry 25 --retry-delay 1 --retry-connrefused -fsS http://127.0.0.1:4102/health > /dev/null
          node ./bin/paint.js bridge stop
          node ./bin/paint.js bridge status

      - name: Verify npm package contents
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run > /tmp/npm-pack.txt 2>&1
          cat /tmp/npm-pack.txt
          grep -q "README.md" /tmp/npm-pack.txt
          grep -q "bin/paint.js" /tmp/npm-pack.txt
          grep -q "bin/terminal-server.js" /tmp/npm-pack.txt
          grep -q "bin/bridge-server.js" /tmp/npm-pack.txt

      - name: Packed global install smoke test
        run: npm run smoke:packed-global

      - name: Check if version changed
        id: version_check
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"

          if [ -z "$PUBLISHED_VERSION" ] || [ "$CURRENT_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish $PACKAGE_NAME@$CURRENT_VERSION (published: ${PUBLISHED_VERSION:-none})."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping publish: $PACKAGE_NAME@$CURRENT_VERSION is already on npm."
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.version_check.outputs.should_publish == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="v${{ steps.version_check.outputs.current_version }}"

          # Skip if release already exists
          if gh release view "${VERSION}" > /dev/null 2>&1; then
            echo "GitHub release ${VERSION} already exists, skipping."
            exit 0
          fi

          # Extract release notes from RELEASE_NOTES.md if it exists, otherwise use CHANGELOG.md
          if [ -f RELEASE_NOTES.md ]; then
            NOTES=$(cat RELEASE_NOTES.md)
          elif [ -f CHANGELOG.md ]; then
            NOTES=$(cat CHANGELOG.md)
          else
            NOTES="Release ${VERSION}"
          fi

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes "${NOTES}" \
            --target "${{ github.sha }}"
